services:

  redis-db:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres-dev:
    image: postgres:16
    restart: unless-stopped
    environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: devdb

    ports:
      - "5437:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
   postgres_data:
   redis_data:
